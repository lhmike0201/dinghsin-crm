<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初訪簡報 — 鼎新</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dinghsin-navy: #003366;
      --dinghsin-blue: #0066cc;
      --dinghsin-cyan: #00a8cc;
      --ink: #1a202c;
      --muted: #718096;
      --bg-soft: #f7fafc;
      --line: #e2e8f0;
      --accent: #dd6b20;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Segoe UI', sans-serif;
      background: #1a202c;
      color: var(--ink);
      overflow: hidden;
      min-height: 100vh;
    }

    /* ─── Slide viewport (16:9) ─── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      background: white;
      width: min(96vw, calc(96vh * 16 / 9));
      aspect-ratio: 16 / 9;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
      display: none;
      padding: 5% 6%;
    }
    .slide.active { display: flex; flex-direction: column; }

    /* ─── Nav & UI ─── */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      transition: background 0.15s;
      z-index: 10;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.25); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-prev { left: 24px; }
    .nav-next { right: 24px; }

    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      color: white;
      z-index: 10;
      font-size: 13px;
    }
    .top-bar .brand { font-weight: 700; letter-spacing: 2px; }
    .top-bar .actions { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.22); }

    .dots {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active { background: white; width: 24px; border-radius: 4px; }

    .slide-num {
      position: absolute;
      bottom: 24px;
      right: 32px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ─── Slide inner shared ─── */
    .slide h1 {
      font-size: 42px;
      color: var(--dinghsin-navy);
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .slide h2 {
      font-size: 32px;
      color: var(--dinghsin-navy);
      font-weight: 800;
      letter-spacing: 0.5px;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .slide h3 {
      font-size: 18px;
      color: var(--dinghsin-blue);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .slide p, .slide li { font-size: 16px; line-height: 1.7; color: var(--ink); }
    .slide .subtitle {
      font-size: 20px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 24px;
    }
    .slide .section-tag {
      display: inline-block;
      background: var(--bg-soft);
      color: var(--dinghsin-blue);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 16px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* ─── Slide 1: Cover ─── */
    .cover-slide {
      background: linear-gradient(135deg, #003366 0%, #0066cc 100%);
      color: white;
      justify-content: center;
      align-items: flex-start;
      padding: 8% 8%;
    }
    .cover-slide h1 { color: white; font-size: 60px; line-height: 1.15; margin-bottom: 20px; }
    .cover-slide .subtitle { color: rgba(255,255,255,0.85); font-size: 24px; }
    .cover-slide .cover-meta {
      margin-top: auto;
      display: flex;
      gap: 40px;
      font-size: 15px;
      color: rgba(255,255,255,0.9);
    }
    .cover-slide .cover-meta strong { color: white; letter-spacing: 2px; font-weight: 700; }
    .cover-slide .dinghsin-logo {
      position: absolute;
      top: 32px;
      right: 40px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      opacity: 0.9;
    }
    .cover-slide .grade-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .cover-slide .cover-tagline {
      margin-top: 32px;
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
      max-width: 80%;
    }

    /* ─── Slide 2: 鼎新簡介 + 類似案例 ─── */
    .intro-slide { flex-direction: column; }
    .intro-slide .intro-body {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 40px;
      flex: 1;
      min-height: 0;
    }
    .intro-slide .about-panel {
      background: linear-gradient(180deg, #003366 0%, #0066cc 100%);
      color: white;
      border-radius: 12px;
      padding: 32px 24px;
    }
    .about-panel h3 { color: rgba(255,255,255,0.9); margin-bottom: 20px; font-size: 14px; letter-spacing: 3px; }
    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 12px;
    }
    .about-stat .n { font-size: 34px; font-weight: 900; letter-spacing: 1px; line-height: 1; }
    .about-stat .l { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .about-panel .desc { font-size: 12px; margin-top: 24px; line-height: 1.75; color: rgba(255,255,255,0.85); }

    .case-panel h3 { margin-bottom: 14px; }
    .case-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-content: start;
    }
    .case-card {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 10px 12px;
      text-align: center;
      transition: all 0.15s;
      overflow: hidden;
    }
    .case-card .logo {
      font-size: 22px;
      font-weight: 900;
      color: var(--dinghsin-navy);
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .case-card .industry { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
    .case-card.match { background: #ebf4ff; border-color: var(--dinghsin-blue); }
    .case-card.match .logo { color: var(--dinghsin-blue); }

    /* ─── Slide 3: 行業常見議題 ─── */
    .issues-slide { flex-direction: column; }
    .issue-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      flex: 1;
      min-height: 0;
    }
    .issue-card {
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .issue-card .num {
      font-size: 32px;
      font-weight: 900;
      color: var(--dinghsin-blue);
      line-height: 1;
      opacity: 0.4;
      min-width: 42px;
    }
    .issue-card .body h4 {
      font-size: 17px;
      color: var(--dinghsin-navy);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .issue-card .body p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    .issue-hit {
      border-color: var(--accent);
      background: #fffaf0;
    }
    .issue-hit .num { color: var(--accent); opacity: 0.8; }
    .issue-hit-tag {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ─── Slide 4: 價值交付 ─── */
    .value-slide { flex-direction: column; }
    .value-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .value-card {
      background: var(--bg-soft);
      border-left: 4px solid var(--dinghsin-blue);
      border-radius: 8px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
    }
    .value-card.tier-main { border-left-color: var(--dinghsin-navy); background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid var(--line); border-left: 4px solid var(--dinghsin-navy); }
    .value-card .product-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--dinghsin-navy);
      margin-bottom: 6px;
    }
    .value-card .product-tier {
      font-size: 10px;
      font-weight: 700;
      color: var(--dinghsin-blue);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .value-card .product-value {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 10px;
      flex: 1;
    }
    .value-card .product-case {
      font-size: 11px;
      color: var(--muted);
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      line-height: 1.5;
    }
    .value-card .product-case strong { color: var(--dinghsin-blue); font-size: 12px; }

    /* ─── Slide 5: 評估流程 ─── */
    .process-slide { flex-direction: column; }
    .process-flow {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      flex: 1;
      min-height: 0;
      align-content: center;
    }
    .process-step {
      position: relative;
      background: white;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 20px 14px;
      text-align: center;
    }
    .process-step .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--dinghsin-blue);
      color: white;
      font-weight: 900;
      font-size: 16px;
      margin-bottom: 10px;
    }
    .process-step h4 {
      font-size: 15px;
      color: var(--dinghsin-navy);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .process-step p {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .process-step::after {
      content: "→";
      position: absolute;
      top: 50%;
      right: -14px;
      transform: translateY(-50%);
      color: var(--dinghsin-blue);
      font-weight: 700;
      font-size: 20px;
      z-index: 1;
    }
    .process-step:last-child::after { display: none; }

    /* ─── Empty state ─── */
    .empty-state {
      background: white;
      border-radius: 12px;
      padding: 60px;
      text-align: center;
      max-width: 500px;
    }
    .empty-state h2 { color: var(--dinghsin-navy); margin-bottom: 12px; }
    .empty-state p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .empty-state a {
      display: inline-block;
      background: var(--dinghsin-blue);
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
    }

    /* ─── Print (A4 landscape, one slide per page) ─── */
    @page { size: A4 landscape; margin: 0; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white; overflow: visible; }
      .stage { position: static; }
      .nav-btn, .top-bar, .dots { display: none !important; }
      .slide {
        display: flex !important;
        flex-direction: column;
        width: 100%;
        height: 100vh;
        aspect-ratio: auto;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }
      .slide:last-child { page-break-after: auto; }
    }

    /* ─── Mobile ─── */
    @media (max-width: 900px) {
      .slide { width: 96vw; padding: 20px; }
      .slide h1 { font-size: 26px; }
      .slide h2 { font-size: 22px; }
      .cover-slide h1 { font-size: 32px; }
      .intro-slide .intro-body { grid-template-columns: 1fr; gap: 12px; }
      .case-grid { grid-template-columns: repeat(3, 1fr); }
      .issue-grid { grid-template-columns: 1fr; gap: 8px; overflow-y: auto; }
      .issue-card { padding: 12px; }
      .value-grid { grid-template-columns: 1fr; overflow-y: auto; }
      .process-flow { grid-template-columns: 1fr 1fr; }
      .process-step::after { display: none; }
      .about-stats { grid-template-columns: 1fr 1fr; }
      .about-stat .n { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="brand">鼎新</div>
  <div class="actions">
    <button class="icon-btn" onclick="toggleFullscreen()">⛶ 全螢幕</button>
    <button class="icon-btn" onclick="window.print()">🖨️ 列印</button>
    <button class="icon-btn" onclick="window.close()">✕ 關閉</button>
  </div>
</div>

<button class="nav-btn nav-prev" onclick="prevSlide()">◀</button>
<button class="nav-btn nav-next" onclick="nextSlide()">▶</button>

<div class="stage" id="stage">
  <!-- Slides injected here -->
</div>

<div class="dots" id="dots"></div>

    'DSP 外連服務平台': {

    'CRM 客戶關係管理': {

    },
    'MRP 物料需求規劃': {
      value: '物料需求計算、委外協力管理',

    },
    'OM 訂單管理 + INV 庫存': {
      value: '訂單／庫存週轉核心模組',
      cases: [{ client: '史泰博', outcome: 'B2B 訂單庫存整合' }],
    },
    '資料移轉服務': {
      value: '既有系統資料清洗、遷移到鼎新',
      cases: [{ client: '（多家客戶）', outcome: '從正航／自建系統平順遷移' }],
    },
    '系統併行 / 資料整合': {
      value: '與 SAP／Oracle 併行整合',
      cases: [{ client: 'BENQ', outcome: '子公司併入母公司 SAP' }],
    },
  };

  // ── 評估流程 ──（可擴充或改文案）
  const PROCESS_STEPS = [
    { num: '01', title: '需求訪談',     desc: '深入了解營運痛點與期望目標' },
    { num: '02', title: '顧問評估',     desc: '產品專家分析需求，草擬解決方案' },
    { num: '03', title: '方案簡報',     desc: '解決方案簡報、報價與導入時程' },
    { num: '04', title: 'POC 驗證',    desc: '關鍵情境驗證，降低導入風險' },
    { num: '05', title: '導入 & 維運', desc: '顧問陪跑上線、教育訓練、長期維運' },
  ];

  // ── 鼎新 ABOUT 統計數字 ──（可依實際更新）
  const ABOUT_STATS = [
    { n: '40+',    l: '年軟體服務經驗' },
    { n: '18,000+', l: '企業客戶' },
    { n: '2,000+', l: '顧問團隊' },
    { n: '90%+',    l: '客戶滿意度' },
  ];

  // ══════════════════════════════════════════
  //  以下為程式邏輯 — 一般情況下不需修改
  // ══════════════════════════════════════════

  const KEY_CLIENTS = 'dinghsin.clients';

  function escHtml(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function getClientById(id) {
    try {
      const all = JSON.parse(localStorage.getItem(KEY_CLIENTS) || '{}');
      return all[id] || null;
    } catch { return null; }
  }

  function getIndustryKey(client) {
    const t = (client.productType || '').toLowerCase();
    if (/服飾|服裝|成衣|布料|紡織/.test(t)) return '服飾';
    if (/食品|飲料|餐飲|烘焙/.test(t))     return '食品';
    if (/3c|電子|電腦|手機|家電/i.test(t))  return '3C 電子';
    if (/機械|設備|工具機|自動化/.test(t)) return '機械設備';
    if (/珠寶|精品|鑽石|銀樓/.test(t))     return '珠寶';
    return '通用';
  }

  function getScaleKey(client) {
    const hc = client.headcount || '';
    if (/500人以上|301～500人/.test(hc)) return 'large';
    if (/101～300人|51～100人/.test(hc)) return 'mid';
    return 'small';
  }

  // 為 slide 2 挑選類似案例（同產業優先，再補其他）
  function pickCases(client, target = 12) {
    const industry = getIndustryKey(client);
    const scale = getScaleKey(client);
    // 同產業同規模 → 同產業任規模 → 任產業同規模 → 其他
    const tier1 = CASE_LIBRARY.filter(c => c.industry === industry && c.scale === scale);
    const tier2 = CASE_LIBRARY.filter(c => c.industry === industry && c.scale !== scale);
    const tier3 = CASE_LIBRARY.filter(c => c.industry !== industry && c.scale === scale);
    const tier4 = CASE_LIBRARY.filter(c => c.industry !== industry && c.scale !== scale);
    const picked = [...tier1, ...tier2, ...tier3, ...tier4].slice(0, target);
    const matchSet = new Set(tier1.map(c => c.name));
    return picked.map(c => ({ ...c, isMatch: matchSet.has(c.name) }));
  }

  // 從 index.html 沿用的解決方案推薦邏輯（簡化重要邏輯）
  function computeRecommendations(d) {
    const channels = d.channels || [];
    const production = d.production || [];
    const currentSys = d.currentSys || [];
    const erp = d.erp || [];
    const erp2 = d.erp2 || [];
    const pain = (d.pain || '') + ' ' + (d.notes || '') + ' ' + (d.sysWeakness || '') + ' ' + (d.sysImprovement || '');
    const largeScale = /500人以上|301～500人/.test(d.headcount || '') ||
                       /5億以上|1億～5億|5,000萬～1億/.test(d.capital || '');

    const map = new Map();
    const add = (name, tier, reason) => {
      if (!map.has(name)) map.set(name, { name, tier, reasons: [] });
      const s = map.get(name);
      if (!s.reasons.includes(reason)) s.reasons.push(reason);
      if (tier === 'main') s.tier = 'main';
    };

    if (erp.includes('T100')) add('T100 ERP', 'main', '客戶明確指定');
    else if (erp.includes('Cosmos')) add('Cosmos ERP', 'main', '客戶明確指定');
    else if (largeScale) add('T100 ERP', 'main', '大型企業規模適用');
    else add('Cosmos ERP', 'main', '中小型企業標配');
    if (erp.includes('Workflow')) add('Workflow', 'main', '客戶明確指定');

    if (channels.some(c => c.startsWith('電商')))  add('DSP 外連服務平台', 'main', '電商通路整合');
    if (channels.some(c => c.startsWith('電商')) || channels.some(c => c.startsWith('官網')))
      add('91APP OMO', 'sub', 'OMO 全渠道整合');
    if (channels.some(c => c.startsWith('門店'))) add('CosmosPOS', 'main', '多門店 POS 整合');

    if (/庫存|倉儲|盤點|對不準/.test(pain))         add('高效儲運 / INV 模組', 'main', '庫存管理需求');
    if (/庫存|盤點/.test(pain))                     add('PDA', 'sub', '倉儲盤點行動化');
    if (/人事|薪資|排班|考勤/.test(pain))           add('HR Solution', 'main', '人事薪資自動化');
    if (/流程|審核|簽核|請購/.test(pain))           add('Workflow', 'main', '流程簽核電子化');
    if (/報表|績效|分析/.test(pain))                add('BI 商業智慧', 'main', '報表視覺化');
    if (/會員|行銷|回購|客訴/.test(pain))           add('CRM', 'main', '會員關係管理');
    if (/ESG|碳盤查|碳排/.test(pain))               add('ESG 方案', 'main', 'ESG 碳盤查');
    if (/AI|智能|自動化/i.test(pain))               add('AI 一體機 / 地端大模型', 'sub', 'AI 應用');

    const erp2Map = {
      'CRM': 'CRM 客戶關係管理',
      'HR': 'HR Solution',
      'DSP': 'DSP 外連服務平台',
      'PDA': 'PDA',
      'AI': 'AI 一體機 / 地端大模型',
      'BI': 'BI 商業智慧',
    };
    erp2.forEach(p => { if (erp2Map[p]) add(erp2Map[p], 'main', '客戶明確指定 ' + p); });

    if (production.includes('自行生產') || production.includes('兩者皆有'))
      add('SFC 車間管理', 'sub', '自行生產需要車間管理');
    if (production.includes('委外代工') || production.includes('兩者皆有'))
      add('MRP 物料需求規劃', 'sub', '委外代工需要物料規劃');
    if (production.includes('純流通（不生產）'))
      add('OM 訂單管理 + INV 庫存', 'sub', '純流通業以訂單／庫存為主');

    if (currentSys.includes('Excel / 人工') || currentSys.includes('無系統'))
      add('ERP 全模組導入', 'main', '從人工作業建立系統化');
    if (currentSys.some(s => /正航/.test(s))) add('資料移轉服務', 'sub', '從正航遷移到鼎新');

    return Array.from(map.values()).sort((a, b) => (a.tier === b.tier) ? 0 : (a.tier === 'main' ? -1 : 1));
  }

  // ══════════════════════════════════════════
  //  Slide renderers — 每張投影片一個 function
  //  之後要加新投影片就在 SLIDES 陣列加項目
  // ══════════════════════════════════════════

  function renderCoverSlide(d) {
    const industry = getIndustryKey(d);
    return `
      <div class="dinghsin-logo">鼎新</div>
      ${d.grade ? `<div class="grade-tag">商機等級 ${d.grade}</div>` : ''}
      <h1>${escHtml(d.name)}</h1>
      <p class="subtitle">初訪簡報</p>
      <p class="cover-tagline">
        鼎新 ERP 解決方案初步規劃 — 依貴司${industry !== '通用' ? escHtml(industry) : ''}業務型態與現況需求，
        提供對應產品組合與導入建議。
      </p>
      <div class="cover-meta">
        <div><strong>業務員</strong><br>${escHtml(d.salesperson || '—')}</div>
        <div><strong>拜訪日期</strong><br>${escHtml(d.visitDate || '—')}</div>
        <div><strong>準備時間</strong><br>${new Date().toLocaleDateString('zh-TW')}</div>
      </div>
    `;
  }

  function renderIntroSlide(d) {
    const cases = pickCases(d, 12);
    const industry = getIndustryKey(d);
    return `
      <div class="section-tag">關於鼎新</div>
      <h2>信賴的企業軟體夥伴</h2>
      <div class="intro-body">
        <div class="about-panel">
          <h3>DATA-CENTRIC BUSINESS</h3>
          <div class="about-stats">
            ${ABOUT_STATS.map(s => `
              <div class="about-stat">
                <div class="n">${escHtml(s.n)}</div>
                <div class="l">${escHtml(s.l)}</div>
              </div>
            `).join('')}
          </div>
          <div class="desc">
            鼎新電腦深耕企業資訊化 40 餘年，服務涵蓋 ERP、CRM、BI、AI、
            雲端、行動化等全方位企業解決方案，是最多企業信賴的軟體品牌。
          </div>
        </div>
        <div class="case-panel">
          <h3>${industry !== '通用' ? escHtml(industry) + ' 及類似客戶案例' : '客戶案例'}</h3>
          <div class="case-grid">
            ${cases.map(c => `
              <div class="case-card ${c.isMatch ? 'match' : ''}">
                <div class="logo">${escHtml(c.name)}</div>
                <div class="industry">${escHtml(c.note || c.industry)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  function renderIssuesSlide(d) {
    const industry = getIndustryKey(d);
    const issues = INDUSTRY_ISSUES[industry] || INDUSTRY_ISSUES['通用'];
    const painText = (d.pain || '') + ' ' + (d.sysWeakness || '');
    // 判斷哪些議題被客戶痛點命中（依關鍵字）
    const hitMap = {
      '多通路訂單管理': /通路|訂單|平台/,
      '會員忠誠度經營': /會員|回購|忠誠|CRM/i,
      '季節性採購壓力': /採購|季節|滯銷|過季/,
      '委外代工管理': /代工|委外|OEM/i,
      '食安追溯': /追溯|批號|履歷/,
      '效期管理': /效期|過期|保存/,
      '多門店同步': /門店|門市|分店|POS/,
      '通路整合': /整合|串接|同步/,
      '產品週期短': /週期|新品|迭代/,
      '料號管理複雜': /料號|BOM|物料/i,
      '通路價保': /價保|報價|價差/,
      '售後服務': /售後|保固|維修|RMA/i,
      '專案型生產': /專案|客製|訂做/,
      '售後服務追蹤': /售後|保固|維修/,
      '委外協力': /委外|協力|外包/,
      '合約管理': /合約|驗收|分期/,
      '單品高價值': /高單價|精品|序號/,
      '會員經營': /會員|CRM|客戶/i,
      '寄售與修改': /寄售|修改|改款/,
      '通路策略': /通路|品牌|定價/,
      '資料整合困難': /整合|串接|對不上/,
      '流程仰賴人工': /手動|人工|Excel/i,
      '報表產出耗時': /報表|統計|分析/,
      '會員／客戶經營': /會員|客戶|CRM/i,
    };
    return `
      <div class="section-tag">${industry !== '通用' ? escHtml(industry) + ' · 常見議題' : '常見營運議題'}</div>
      <h2>企業經常面臨的挑戰</h2>
      <div class="issue-grid">
        ${issues.map((iss, idx) => {
          const hitPattern = hitMap[iss.title];
          const isHit = hitPattern && hitPattern.test(painText);
          return `
            <div class="issue-card ${isHit ? 'issue-hit' : ''}">
              <div class="num">${String(idx + 1).padStart(2, '0')}</div>
              <div class="body">
                <h4>${escHtml(iss.title)}${isHit ? '<span class="issue-hit-tag">貴司提及</span>' : ''}</h4>
                <p>${escHtml(iss.desc)}</p>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderValueSlide(d) {
    const recs = computeRecommendations(d).slice(0, 6);
    return `
      <div class="section-tag">鼎新價值交付</div>
      <h2>對應貴司需求的產品組合</h2>
      <div class="value-grid">
        ${recs.map(r => {
          const v = PRODUCT_VALUE[r.name] || { value: r.reasons[0] || '', cases: [] };
          const caseText = v.cases && v.cases.length
            ? `<div class="product-case"><strong>案例：${escHtml(v.cases[0].client)}</strong><br>${escHtml(v.cases[0].outcome)}</div>`
            : '';
          return `
            <div class="value-card tier-${r.tier}">
              <div class="product-tier">${r.tier === 'main' ? '主推' : '建議'}</div>
              <div class="product-name">${escHtml(r.name)}</div>
              <div class="product-value">${escHtml(v.value)}</div>
              ${caseText}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderProcessSlide(d) {
    return `
      <div class="section-tag">評估與價值交付流程</div>
      <h2>從需求到上線 — 顧問陪跑</h2>
      <div class="process-flow">
        ${PROCESS_STEPS.map(s => `
          <div class="process-step">
            <div class="step-num">${escHtml(s.num)}</div>
            <h4>${escHtml(s.title)}</h4>
            <p>${escHtml(s.desc)}</p>
          </div>
        `).join('')}
      </div>
    `;
  }

  // ══════════════════════════════════════════
  //  Slides 陣列 — 之後要加新投影片就 push 一個項目
  // ══════════════════════════════════════════
  const SLIDES = [
    { id: 'cover',   className: 'cover-slide',   render: renderCoverSlide },
    { id: 'intro',   className: 'intro-slide',   render: renderIntroSlide },
    { id: 'issues',  className: 'issues-slide',  render: renderIssuesSlide },
    { id: 'value',   className: 'value-slide',   render: renderValueSlide },
    { id: 'process', className: 'process-slide', render: renderProcessSlide },
  ];

  // ══════════════════════════════════════════
  //  Slideshow logic
  // ══════════════════════════════════════════
  let currentIndex = 0;
  let clientData = null;

  function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return renderEmpty('缺少客戶 ID');
    clientData = getClientById(id);
    if (!clientData) return renderEmpty('找不到客戶資料。請回主頁重新選取。');
    renderSlides();
    document.addEventListener('keydown', onKey);
  }

  function renderEmpty(msg) {
    document.getElementById('stage').innerHTML = `
      <div class="empty-state">
        <h2>簡報載入失敗</h2>
        <p>${escHtml(msg)}</p>
        <a href="index.html">← 回主頁</a>
      </div>
    `;
    document.querySelector('.nav-prev').style.display = 'none';
    document.querySelector('.nav-next').style.display = 'none';
  }

  function renderSlides() {
    const stage = document.getElementById('stage');
    stage.innerHTML = SLIDES.map((s, i) => `
      <div class="slide ${s.className}${i === 0 ? ' active' : ''}" data-index="${i}">
        ${s.render(clientData)}
        <div class="slide-num">${i + 1} / ${SLIDES.length}</div>
      </div>
    `).join('');
    renderDots();
    updateNavState();
  }

  function renderDots() {
    document.getElementById('dots').innerHTML = SLIDES.map((s, i) =>
      `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goSlide(${i})"></div>`
    ).join('');
  }

  function goSlide(i) {
    if (i < 0 || i >= SLIDES.length) return;
    document.querySelectorAll('.slide').forEach(el => el.classList.remove('active'));
    document.querySelector(`.slide[data-index="${i}"]`).classList.add('active');
    currentIndex = i;
    renderDots();
    updateNavState();
  }

  function updateNavState() {
    document.querySelector('.nav-prev').disabled = currentIndex === 0;
    document.querySelector('.nav-next').disabled = currentIndex === SLIDES.length - 1;
  }

  function prevSlide() { if (currentIndex > 0) goSlide(currentIndex - 1); }
  function nextSlide() { if (currentIndex < SLIDES.length - 1) goSlide(currentIndex + 1); }

  function onKey(e) {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); nextSlide(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevSlide(); }
    else if (e.key === 'Home') goSlide(0);
    else if (e.key === 'End') goSlide(SLIDES.length - 1);
    else if (e.key === 'Escape') document.exitFullscreen && document.exitFullscreen();
  }

  function toggleFullscreen() {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  }

  init();
</script>
